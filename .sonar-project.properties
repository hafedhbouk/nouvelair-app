# SonarQube Configuration for NouvelAir Project
# ==============================================

# Project identification
sonar.projectKey=nouvelair-project
sonar.projectName=NouvelAir - Application de Gestion des Reservations
sonar.projectVersion=1.0

# Source encoding
sonar.sourceEncoding=UTF-8

# Python version
sonar.python.version=3.12

# Path to source directories
sonar.sources=bookings,destinations,flights,nouvelair
sonar.exclusions=**/__pycache__/**,**/migrations/**,**/venv/**,**/manage.py,**/settings.py,**/asgi.py,**/wsgi.py,**/admin.py,**/fixtures/**,**/*.pyc,.github/**,.venv/**

# Test directories (for coverage only, not analysis)
sonar.tests=tests

# Path to test coverage report
sonar.python.coverage.reportPaths=coverage.xml

# Path to coverage reports (XML format)
sonar.coverage.exclusions=**/tests/**,**/migrations/**,**/admin.py,**/settings.py,**/asgi.py,**/wsgi.py,**/fixtures/**,**/venv/**

# Quality gate settings
sonar.qualitygate.wait=true

# Python specific settings
sonar.python.bandit.reportPaths=bandit_results.json